<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack - Personal Finance Tracker</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-[#2563EB] flex items-center justify-center text-white shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">FinTrack</h1>
                    <p class="text-sm text-slate-500">Personal Finance Tracker</p>
                </div>
            </div>
            <button id="clearDataBtn" class="text-sm text-slate-500 hover:text-rose-600 transition-colors">
                Clear All Data
            </button>
        </header>

        <!-- Dashboard Cards -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Balance</p>
                <p id="totalBalance" class="text-3xl font-bold text-slate-900">$0.00</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Income</p>
                <p id="totalIncome" class="text-3xl font-bold text-emerald-600">$0.00</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <p class="text-sm font-medium text-slate-500 mb-1">Total Expenses</p>
                <p id="totalExpense" class="text-3xl font-bold text-rose-600">$0.00</p>
            </div>
        </section>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Form & Chart -->
            <div class="lg:col-span-5 space-y-8">
                <!-- Add Transaction Form -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                    <h2 class="text-lg font-semibold text-slate-900 mb-5">Add Transaction</h2>
                    <form id="transactionForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="type" class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                                <select id="type" name="type"
                                    class="w-full rounded-lg border-slate-200 border px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-transparent transition-shadow">
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            <div>
                                <label for="amount" class="block text-sm font-medium text-slate-700 mb-1">Amount</label>
                                <input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="0.00"
                                    required
                                    class="w-full rounded-lg border-slate-200 border px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-transparent transition-shadow" />
                            </div>
                        </div>

                        <div>
                            <label for="description"
                                class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                            <input id="description" name="description" type="text" placeholder="e.g. Grocery shopping"
                                required
                                class="w-full rounded-lg border-slate-200 border px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-transparent transition-shadow" />
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="category"
                                    class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                                <select id="category" name="category"
                                    class="w-full rounded-lg border-slate-200 border px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-transparent transition-shadow">
                                    <option value="Food">Food</option>
                                    <option value="Rent">Rent</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Salary">Salary</option>
                                    <option value="Freelance">Freelance</option>
                                    <option value="Investments">Investments</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label for="date" class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                                <input id="date" name="date" type="date" required
                                    class="w-full rounded-lg border-slate-200 border px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:border-transparent transition-shadow" />
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full bg-[#2563EB] hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm">
                            Add Transaction
                        </button>
                    </form>
                </div>

                <!-- Expense Breakdown Chart -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                    <h2 class="text-lg font-semibold text-slate-900 mb-4">Expense Breakdown</h2>
                    <div class="relative h-64">
                        <canvas id="expenseChart"></canvas>
                    </div>
                    <p id="emptyChartMessage" class="hidden text-center text-sm text-slate-400 mt-4">No expenses to
                        display.</p>
                </div>
            </div>

            <!-- Right Column: Transaction History -->
            <div class="lg:col-span-7">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div
                        class="p-6 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        <h2 class="text-lg font-semibold text-slate-900">Transaction History</h2>
                        <div class="flex bg-slate-100 rounded-lg p-1" id="filterGroup">
                            <button data-filter="all"
                                class="filter-btn active px-4 py-1.5 text-sm font-medium rounded-md transition-all text-slate-600 hover:text-slate-900">All</button>
                            <button data-filter="income"
                                class="filter-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all text-slate-600 hover:text-slate-900">Income</button>
                            <button data-filter="expense"
                                class="filter-btn px-4 py-1.5 text-sm font-medium rounded-md transition-all text-slate-600 hover:text-slate-900">Expense</button>
                        </div>
                    </div>
                    <div id="transactionList" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                        <!-- Transactions injected here -->
                    </div>
                    <div id="emptyState" class="hidden p-10 text-center">
                        <p class="text-slate-400 text-sm">No transactions found.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
